<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC P2P Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
    }
    #messages {
      border: 1px solid #ccc;
      height: 320px;
      overflow-y: auto;
      padding: 12px;
      margin: 16px 0;
      border-radius: 8px;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    input, button {
      padding: 10px;
      font-size: 14px;
    }
    input[type="text"] {
      flex: 1;
    }
    .msg {
      margin: 8px 0;
    }
    .self {
      color: blue;
    }
    .peer {
      color: green;
    }
    .system {
      color: #777;
      font-style: italic;
    }
    input[type="file"] {
      flex: 1;
      padding: 6px 10px;
    }
    #sendFileBtn {
      white-space: nowrap;
    }
    #incomingFileUI {
      display: none;
      background: #f0f8ff;
      border: 1px solid #4a9eff;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    #incomingFileInfo {
      margin: 0 0 10px 0;
      font-weight: bold;
      font-size: 14px;
    }
    #acceptFileBtn {
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #declineFileBtn {
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #transferProgress {
      display: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
      background: #fafafa;
    }
    #transferProgressLabel {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #transferProgressBar {
      width: 100%;
      height: 14px;
      border-radius: 4px;
      margin-bottom: 4px;
      appearance: none;
      -webkit-appearance: none;
      border: none;
    }
    #transferProgressBar::-webkit-progress-bar {
      background: #e0e0e0;
      border-radius: 4px;
    }
    #transferProgressBar::-webkit-progress-value {
      background: #4a9eff;
      border-radius: 4px;
    }
    #transferProgressBar::-moz-progress-bar {
      background: #4a9eff;
      border-radius: 4px;
    }
    #transferProgressText {
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Simple WebRTC P2P Chat</h1>

  <div class="row">
    <input id="roomInput" type="text" placeholder="Enter room ID" />
    <button id="joinBtn">Join Room</button>
  </div>

  <div id="status">Not connected</div>
  <div id="messages"></div>

  <div class="row">
    <input id="messageInput" type="text" placeholder="Type a message" disabled />
    <button id="sendBtn" disabled>Send</button>
  </div>

  <div class="row">
    <input type="file" id="fileInput" disabled />
    <button id="sendFileBtn" disabled>Send File</button>
  </div>

  <div id="transferProgress">
    <div id="transferProgressLabel"></div>
    <progress id="transferProgressBar" value="0" max="100"></progress>
    <div id="transferProgressText"></div>
  </div>

  <div id="incomingFileUI">
    <p id="incomingFileInfo"></p>
    <div class="row" style="margin-bottom:0">
      <button id="acceptFileBtn">💾 Accept &amp; Save</button>
      <button id="declineFileBtn">✖ Decline</button>
    </div>
  </div>

  <!-- type="module" is required so index.js can use ES import for native-file-system-adapter -->
  <script type="module" src="index.js"></script>
</body>
</html>
