<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC P2P Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
    }
    #messages {
      border: 1px solid #ccc;
      height: 320px;
      overflow-y: auto;
      padding: 12px;
      margin: 16px 0;
      border-radius: 8px;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    input, button {
      padding: 10px;
      font-size: 14px;
    }
    input[type="text"] {
      flex: 1;
    }
    .msg {
      margin: 8px 0;
    }
    .self {
      color: blue;
    }
    .peer {
      color: green;
    }
    .system {
      color: #777;
      font-style: italic;
    }
    input[type="file"] {
      flex: 1;
      padding: 6px 10px;
    }
    #sendFileBtn {
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>Simple WebRTC P2P Chat</h1>

  <div class="row">
    <input id="roomInput" type="text" placeholder="Enter room ID" />
    <button id="joinBtn">Join Room</button>
  </div>

  <div id="status">Not connected</div>
  <div id="messages"></div>

  <div class="row">
    <input id="messageInput" type="text" placeholder="Type a message" disabled />
    <button id="sendBtn" disabled>Send</button>
  </div>

  <div class="row">
    <input type="file" id="fileInput" disabled />
    <button id="sendFileBtn" disabled>Send File</button>
  </div>

  <script src="index.js"></script>
</body>
</html>
